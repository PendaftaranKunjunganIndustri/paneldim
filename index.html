<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE COMMAND CENTER - Admin AICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00e6ff;
            --primary-hover: #00b8cc;
            --bg-start: #050b14; 
            --bg-end: #01060e;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --neumorphic-light: rgba(255, 255, 255, 0.02);
            --neumorphic-shadow: rgba(0, 0, 0, 0.9);
            --border-color: rgba(0, 230, 255, 0.15);
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --error-color: #f44336;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-start), #00152b, var(--bg-end));
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: var(--text-main); overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- STYLING LOGIN KETAT --- */
        #loginSection {
            background-color: var(--card-bg); backdrop-filter: blur(20px);
            width: 100%; max-width: 450px; padding: 50px 40px;
            border-radius: 20px; border: 1px solid var(--border-color);
            box-shadow: 20px 20px 40px var(--neumorphic-shadow), -20px -20px 40px var(--neumorphic-light);
            position: absolute; z-index: 10;
        }

        .header h1 {
            font-family: 'Syncopate', sans-serif; color: var(--error-color); 
            font-size: 20px; font-weight: 700; margin-bottom: 10px; text-align: center;
            text-shadow: 0 0 15px rgba(244, 67, 54, 0.5); letter-spacing: 2px;
        }

        .header p {
            text-align: center; color: var(--text-muted); font-size: 12px;
            margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label {
            display: block; margin-bottom: 10px; font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted);
        }
        .form-group input {
            width: 100%; padding: 15px 15px 15px 45px; background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent; border-radius: 10px; color: var(--text-main); font-size: 14px;
            box-shadow: inset 5px 5px 10px var(--neumorphic-shadow), inset -5px -5px 10px var(--neumorphic-light);
            transition: all 0.3s ease;
        }
        .form-group i { position: absolute; left: 18px; top: 40px; color: var(--text-muted); }
        .form-group input:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: inset 2px 2px 5px var(--neumorphic-shadow), 0 0 15px rgba(0, 230, 255, 0.3);
        }

        .btn-action {
            background-color: var(--bg-start); color: var(--primary-color);
            border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 8px;
            font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.3s ease;
            box-shadow: 4px 4px 10px var(--neumorphic-shadow), -4px -4px 10px var(--neumorphic-light);
        }
        .btn-action:hover { background-color: var(--bg-end); text-shadow: 0 0 5px var(--primary-color); }

        /* --- STYLING DASHBOARD ADMIN --- */
        #dashboardSection {
            display: none; width: 100%; max-width: 1400px; height: 95vh;
            background-color: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border-color);
            padding: 25px; flex-direction: column;
            box-shadow: 15px 15px 35px var(--neumorphic-shadow), -15px -15px 35px var(--neumorphic-light);
        }

        .dash-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px;
        }

        .dash-header h2 { font-family: 'Syncopate', sans-serif; color: var(--primary-color); font-size: 18px; }
        
        .logout-btn { color: var(--error-color); border-color: rgba(244,67,54,0.3); }

        /* TABEL RESPONSIF */
        .table-responsive {
            flex-grow: 1; overflow-x: auto; overflow-y: auto; border-radius: 10px;
            background: rgba(0,0,0,0.2);
            box-shadow: inset 5px 5px 15px var(--neumorphic-shadow), inset -5px -5px 15px var(--neumorphic-light);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px; }
        th {
            background: rgba(0, 230, 255, 0.1); color: var(--primary-color); font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; padding: 15px;
            position: sticky; top: 0; z-index: 2; backdrop-filter: blur(10px);
        }
        td { padding: 12px 15px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #d1d5db; vertical-align: middle; }
        tr:hover td { background-color: rgba(255,255,255,0.02); color: #fff; }

        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
        .status-pending { background: rgba(255, 152, 0, 0.2); color: var(--warning-color); border: 1px solid var(--warning-color); }
        .status-approved { background: rgba(76, 175, 80, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }

        .img-link {
            color: var(--primary-color); text-decoration: none; display: inline-block;
            margin: 2px 0; background: rgba(0, 230, 255, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 10px;
        }
        .img-link:hover { background: rgba(0, 230, 255, 0.3); }

        .action-cell { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-verify { color: var(--success-color); border-color: rgba(76,175,80,0.3); padding: 6px 10px; font-size: 10px; }
        .btn-delete { color: var(--error-color); border-color: rgba(244,67,54,0.3); padding: 6px 10px; font-size: 10px; }

        @media (max-width: 768px) {
            .dash-header { flex-direction: column; gap: 15px; text-align: center; }
            #dashboardSection { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="header">
            <h1>RESTRICTED AREA</h1>
            <p>Admin Command Center</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Admin Email</label><i class="fas fa-envelope"></i>
                <input type="email" id="email" required placeholder="admin@aice.com">
            </div>
            <div class="form-group">
                <label>Security Key</label><i class="fas fa-lock"></i>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-action" style="width: 100%; padding: 15px; font-size: 14px;" id="btnLogin">
                <i class="fas fa-fingerprint"></i> AUTHENTICATE
            </button>
            <div id="loginAlert" style="margin-top: 15px; text-align: center; color: var(--error-color); font-size: 12px; font-weight: bold;"></div>
        </form>
    </div>

    <div id="dashboardSection">
        <div class="dash-header">
            <div>
                <h2>AICE COMMAND CENTER</h2>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">Data Pendaftaran Lengkap</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-action" id="btnRefresh"><i class="fas fa-sync-alt"></i> REFRESH</button>
                <button class="btn-action logout-btn" id="btnLogout"><i class="fas fa-sign-out-alt"></i> DISCONNECT</button>
            </div>
        </div>

        <div id="loader" style="display:none; text-align:center; padding: 20px; color: var(--primary-color);"><i class="fas fa-circle-notch fa-spin"></i> FETCHING DATA...</div>

        <div class="table-responsive">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Info Mahasiswa</th>
                        <th>Akademik</th>
                        <th>Bukti IG</th>
                        <th>Info Pembayaran</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_Vm_WiUckLP-FmoY_sampj-P1rR943PY",
            authDomain: "pendaftran-kunjungan-aice.firebaseapp.com",
            projectId: "pendaftran-kunjungan-aice",
            storageBucket: "pendaftran-kunjungan-aice.firebasestorage.app",
            messagingSenderId: "131381593832",
            appId: "1:131381593832:web:b7c094fc720c3f65c16b5d",
            measurementId: "G-E5ES6P4CD8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const tableBody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');

        // Cek Login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'flex';
                fetchData();
            } else {
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
            }
        });

        // Proses Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');

            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> VERIFYING...';
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById('loginAlert').textContent = "";
            } catch (error) {
                document.getElementById('loginAlert').textContent = "ACCESS DENIED: Kredensial Salah.";
            } finally {
                btnLogin.innerHTML = '<i class="fas fa-fingerprint"></i> AUTHENTICATE';
            }
        });

        // Logout
        document.getElementById('btnLogout').addEventListener('click', () => { signOut(auth); });
        document.getElementById('btnRefresh').addEventListener('click', fetchData);

        // Fetch Data
        async function fetchData() {
            loader.style.display = 'block';
            tableBody.innerHTML = '';
            
            try {
                // Pastikan nama koleksinya sama: pendaftaran_aice_lengkap
                const q = query(collection(db, "pendaftaran_aice_lengkap"), orderBy("tanggalPendaftaran", "desc"));
                const querySnapshot = await getDocs(q);
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const docId = docSnap.id;
                    
                    let waktu = data.tanggalPendaftaran ? data.tanggalPendaftaran.toDate().toLocaleString('id-ID') : "Tidak diketahui";
                    const statusClass = data.status === "APPROVED" ? "status-approved" : "status-pending";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-size:10px;">${waktu}</td>
                        <td>
                            <strong>${data.nama}</strong><br>
                            <span style="color:var(--primary-color); font-family:monospace;">NIM: ${data.nim}</span>
                        </td>
                        <td style="font-size:11px;">
                            ${data.universitas} - ${data.fakultas}<br>
                            ${data.prodi} (Smt: ${data.semester})<br>
                            Kelas: ${data.kelas}
                        </td>
                        <td>
                            <a href="${data.buktiIgHmpsUrl}" target="_blank" class="img-link"><i class="fas fa-external-link-alt"></i> IG HMPS</a><br>
                            <a href="${data.buktiIgUpuUrl}" target="_blank" class="img-link"><i class="fas fa-external-link-alt"></i> IG UPU</a>
                        </td>
                        <td style="font-size:11px;">
                            Bank: <strong>${data.namaBank}</strong><br>
                            <a href="${data.buktiPembayaranUrl}" target="_blank" class="img-link" style="background:rgba(76,175,80,0.2); color:#81c784;"><i class="fas fa-receipt"></i> Cek Resi</a>
                        </td>
                        <td><span class="status-badge ${statusClass}">${data.status}</span></td>
                        <td class="action-cell">
                            ${data.status !== "APPROVED" ? `<button class="btn-action btn-verify" onclick="verifyData('${docId}')"><i class="fas fa-check"></i> VERIFIKASI</button>` : ''}
                            <button class="btn-action btn-delete" onclick="deleteData('${docId}')"><i class="fas fa-trash"></i> HAPUS</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error(error);
                alert("SYSTEM ERROR: Gagal mengambil data. Pastikan Anda punya akses Admin.");
            } finally {
                loader.style.display = 'none';
            }
        }

        // Fungsi Global untuk Tombol HTML
        window.verifyData = async function(docId) {
            if(confirm("Setujui pendaftar ini?")) {
                try {
                    await updateDoc(doc(db, "pendaftaran_aice_lengkap", docId), { status: "APPROVED" });
                    fetchData();
                } catch (error) { alert("Gagal memverifikasi."); }
            }
        };

        window.deleteData = async function(docId) {
            if(confirm("PERINGATAN: Data akan dihapus permanen. Lanjutkan?")) {
                try {
                    await deleteDoc(doc(db, "pendaftaran_aice_lengkap", docId));
                    fetchData();
                } catch (error) { alert("Gagal menghapus data."); }
            }
        };
    </script>
</body>
</html>
