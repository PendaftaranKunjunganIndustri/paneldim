<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pendaftaran Kunjungan Industri - Industrial Visit Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    
    <style>
        :root {
            --primary-color: #00e6ff;
            --primary-hover: #00b8cc;
            --bg-start: #0a192f;
            --bg-end: #020c1b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --neumorphic-light: rgba(255, 255, 255, 0.03);
            --neumorphic-shadow: rgba(0, 0, 0, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #4caf50;
            --error-color: #f44336;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-start), #002244, var(--bg-end));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px 15px; color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 100%; max-width: 550px;
            padding: 45px 35px; border-radius: 20px;
            box-shadow: 15px 15px 35px var(--neumorphic-shadow), 
                        -15px -15px 35px var(--neumorphic-light), 
                        inset 1px 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 {
            font-family: 'Syncopate', sans-serif; color: var(--primary-color);
            font-size: 20px; font-weight: 700; margin-bottom: 12px;
            line-height: 1.4; text-shadow: 0 0 15px rgba(0, 230, 255, 0.6);
        }
        .header p { color: var(--text-muted); font-size: 13px; line-height: 1.6; letter-spacing: 0.5px; }

        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label {
            display: block; margin-bottom: 10px; font-weight: 600;
            color: var(--text-main); font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
        }

        .input-with-icon { position: relative; }
        .input-with-icon i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); transition: color 0.3s ease; z-index: 2;
        }

        .form-group input[type="text"], .form-group select, .form-group input[type="file"] {
            width: 100%; padding: 16px 16px 16px 50px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent; border-radius: 12px;
            font-size: 14px; color: var(--text-main);
            box-shadow: inset 5px 5px 10px var(--neumorphic-shadow), 
                        inset -5px -5px 10px var(--neumorphic-light);
            transition: all 0.3s ease;
        }

        .form-group input[type="file"] { padding: 12px 16px 12px 50px; font-size: 12px; }
        .form-group input[type="file"]::file-selector-button {
            background-color: var(--primary-color); color: #000; font-weight: bold;
            border: none; padding: 8px 15px; border-radius: 8px; margin-right: 15px; cursor: pointer;
        }

        .form-group select option { background-color: var(--bg-start); color: var(--text-main); }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            box-shadow: inset 2px 2px 5px var(--neumorphic-shadow), 
                        inset -2px -2px 5px var(--neumorphic-light), 
                        0 0 20px rgba(0, 230, 255, 0.4);
            border-color: rgba(0, 230, 255, 0.3);
        }

        .form-group input:focus + i, .form-group select:focus + i {
            color: var(--primary-color); text-shadow: 0 0 10px var(--primary-color);
        }

        .form-group input:valid:not(:placeholder-shown) { border-bottom: 2px solid var(--success-color); }
        .form-group input:invalid:not(:placeholder-shown) { border-bottom: 2px solid var(--error-color); }

        .btn-submit {
            width: 100%; background-color: var(--bg-start); color: var(--primary-color);
            border: 1px solid var(--border-color); padding: 18px; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; margin-top: 15px; overflow: hidden;
            box-shadow: 8px 8px 20px var(--neumorphic-shadow), -8px -8px 20px var(--neumorphic-light);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            box-shadow: 4px 4px 10px var(--neumorphic-shadow), -4px -4px 10px var(--neumorphic-light);
            background-color: var(--bg-end); text-shadow: 0 0 10px var(--primary-color);
        }
        .btn-submit:disabled {
            background-color: rgba(255,255,255,0.05); color: var(--text-muted); cursor: not-allowed;
            box-shadow: none; border-color: transparent; text-shadow: none;
        }

        .alert {
            padding: 15px; border-radius: 10px; margin-top: 25px; text-align: center;
            font-size: 13px; font-weight: 600; display: none; backdrop-filter: blur(5px);
            letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .alert.success { background-color: rgba(76, 175, 80, 0.2); color: #81c784; border: 1px solid rgba(76, 175, 80, 0.5); display: block; }
        .alert.error { background-color: rgba(244, 67, 54, 0.2); color: #e57373; border: 1px solid rgba(244, 67, 54, 0.5); display: block; }

        @media (max-width: 500px) {
            .container { padding: 35px 20px; border-radius: 15px; }
            .header h1 { font-size: 18px; }
            .form-group input, .form-group select { font-size: 14px; padding: 14px 14px 14px 45px; }
        }

        /* Styling Khusus Info Box Transfer */
        .transfer-box {
            background: rgba(0, 230, 255, 0.05);
            border: 1px solid var(--primary-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.5);
        }
        .transfer-box p { margin-bottom: 5px; }
        .transfer-bank { font-size: 18px; font-weight: 700; color: var(--primary-color); letter-spacing: 2px; }
        .transfer-rek { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 3px; font-family: monospace; margin: 10px 0; }
        .transfer-nama { font-size: 14px; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Formulir Pendaftaran Lengkap</h1>
            <p>Sistem Pendaftaran Kunjungan Industri <br> PT. Aice Sumatera Industry</p>
        </div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="nama">1. Nama Lengkap <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" required minlength="3" pattern="[a-zA-Z\s]+" title="Hanya huruf dan spasi">
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="nim">2. NIM <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="nim" placeholder="Masukkan NIM" required pattern="\d+" minlength="8" maxlength="15">
                    <i class="fas fa-id-card"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="kelas">3. Kelas <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="kelas" placeholder="Contoh: IF-A Pagi" required minlength="2">
                    <i class="fas fa-users"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="semester">4. Semester <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <select id="semester" required>
                        <option value="" disabled selected>-- Pilih Semester --</option>
                        <option value="1">Semester 1</option><option value="2">Semester 2</option>
                        <option value="3">Semester 3</option><option value="4">Semester 4</option>
                        <option value="5">Semester 5</option><option value="6">Semester 6</option>
                        <option value="7">Semester 7</option><option value="8">Semester 8</option>
                        <option value="9">Semester 9</option><option value="10">Semester 10+</option>
                    </select>
                    <i class="fas fa-layer-group"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="prodi">5. Prodi <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="prodi" placeholder="Masukkan Program Studi" required minlength="3">
                    <i class="fas fa-book-open"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="fakultas">6. Fakultas <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="fakultas" placeholder="Masukkan Fakultas" required minlength="3">
                    <i class="fas fa-building"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="universitas">7. Universitas <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="universitas" placeholder="Masukkan Universitas" required minlength="3">
                    <i class="fas fa-university"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="buktiKtm">8. Upload Foto KTM <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="file" id="buktiKtm" accept="image/*, .heic, .heif" required>
                    <i class="fas fa-id-badge"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="buktiIgHmps">9. Upload bukti follow IG HMPS Informatika <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="file" id="buktiIgHmps" accept="image/*, .heic, .heif" required>
                    <i class="fab fa-instagram"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="buktiIgUpu">10. Upload bukti follow IG Official UPU <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="file" id="buktiIgUpu" accept="image/*, .heic, .heif" required>
                    <i class="fab fa-instagram"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="namaBank">11. Nama bank/ewallet Anda yang digunakan untuk transfer <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="text" id="namaBank" placeholder="Contoh: BCA = BUDI / DANA = Ridho Sandhika/ OVO = Azwar" required minlength="2">
                    <i class="fas fa-wallet"></i>
                </div>
            </div>

            <div class="form-group">
                <label>12. Instruksi Pembayaran Transfer</label>
                <div class="transfer-box">
                    <p style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Silakan Transfer Biaya Kunjungan Ke:</p>
                    <div class="transfer-bank">BANK BRI</div>
                    <div class="transfer-rek">732301016114535</div>
                    <div class="transfer-nama">A.N. <strong>BUDI PRASTYO</strong></div>
                </div>
            </div>

            <div class="form-group">
                <label for="buktiPembayaran">13. Upload bukti pembayaran <span style="color:#f44336">*</span></label>
                <div class="input-with-icon">
                    <input type="file" id="buktiPembayaran" accept="image/*, .heic, .heif" required>
                    <i class="fas fa-receipt"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">DAFTAR SEKARANG</button>
            <div id="alertMessage" class="alert"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_Vm_WiUckLP-FmoY_sampj-P1rR943PY",
            authDomain: "pendaftran-kunjungan-aice.firebaseapp.com",
            projectId: "pendaftran-kunjungan-aice",
            storageBucket: "pendaftran-kunjungan-aice.firebasestorage.app",
            messagingSenderId: "131381593832",
            appId: "1:131381593832:web:b7c094fc720c3f65c16b5d",
            measurementId: "G-E5ES6P4CD8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertMessage = document.getElementById('alertMessage');

        function showAlert(message, type) {
            alertMessage.textContent = message;
            alertMessage.className = `alert ${type}`;
            alertMessage.style.display = 'block';
        }

        async function uploadImage(file) {
            let fileToUpload = file;

            // CEK & KONVERSI JIKA FILE ADALAH HEIC/HEIF
            const namaFile = file.name.toLowerCase();
            if (file.type === "image/heic" || file.type === "image/heif" || namaFile.endsWith(".heic") || namaFile.endsWith(".heif")) {
                try {
                    console.log(`Mendeteksi file HEIC (${file.name}), konversi ke JPG...`);
                    const convertedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                    const finalBlob = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
                    const namaBaru = file.name.replace(/\.[^/.]+$/, ".jpg");
                    fileToUpload = new File([finalBlob], namaBaru, { type: "image/jpeg" });
                } catch (error) {
                    console.error("Gagal konversi HEIC:", error);
                    throw new Error("Gagal mengkonversi format iPhone (HEIC).");
                }
            }

            // PROSES UPLOAD KE IMGBB
            const imgbbAPIKey = "1673e7b27bb7c96c324b1b26cc392dca"; 
            const formData = new FormData();
            formData.append("image", fileToUpload);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    return result.data.url;
                } else {
                    throw new Error("Gagal upload ke ImgBB");
                }
            } catch (error) {
                console.error("ImgBB Error:", error);
                throw error;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const nim = document.getElementById('nim').value.trim();
            const kelas = document.getElementById('kelas').value.trim();
            const semester = document.getElementById('semester').value;
            const prodi = document.getElementById('prodi').value.trim();
            const fakultas = document.getElementById('fakultas').value.trim();
            const universitas = document.getElementById('universitas').value.trim();
            const namaBank = document.getElementById('namaBank').value.trim();

            const fileKtm = document.getElementById('buktiKtm').files[0];
            const fileIgHmps = document.getElementById('buktiIgHmps').files[0];
            const fileIgUpu = document.getElementById('buktiIgUpu').files[0];
            const filePembayaran = document.getElementById('buktiPembayaran').files[0];

            if (!nama || !nim || !kelas || !semester || !prodi || !fakultas || !universitas || !namaBank) {
                showAlert('SYSTEM ERROR: Semua isian teks wajib diisi.', 'error');
                return;
            }

            if (!fileKtm || !fileIgHmps || !fileIgUpu || !filePembayaran) {
                showAlert('SYSTEM ERROR: Semua bukti gambar wajib diupload.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> MEMPROSES & UPLOADING DATA...';
            alertMessage.style.display = 'none';

            try {
                const [urlKtm, urlIgHmps, urlIgUpu, urlPembayaran] = await Promise.all([
                    uploadImage(fileKtm),
                    uploadImage(fileIgHmps),
                    uploadImage(fileIgUpu),
                    uploadImage(filePembayaran)
                ]);

                await addDoc(collection(db, "pendaftaran_aice_lengkap"), {
                    nama: nama, nim: nim, kelas: kelas, semester: parseInt(semester),
                    prodi: prodi, fakultas: fakultas, universitas: universitas, namaBank: namaBank,
                    buktiKtmUrl: urlKtm, buktiIgHmpsUrl: urlIgHmps, buktiIgUpuUrl: urlIgUpu, buktiPembayaranUrl: urlPembayaran,
                    tanggalPendaftaran: serverTimestamp(), status: "PENDING VERIFICATION"
                });

                showAlert('TRANSMISSION SUCCESS! Data dan File Anda telah terenkripsi di sistem.', 'success');
                form.reset();
            } catch (error) {
                console.error("Proses Pendaftaran Error: ", error);
                showAlert('CONNECTION FAILED! Pastikan koneksi internet stabil atau coba gunakan format gambar standar (JPG/PNG).', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'DAFTAR SEKARANG';
            }
        });
    </script>
</body>
</html>
