<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE COMMAND CENTER - Admin AICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-color: #00e6ff;
            --primary-hover: #00b8cc;
            --bg-start: #050b14; 
            --bg-end: #01060e;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --neumorphic-light: rgba(255, 255, 255, 0.02);
            --neumorphic-shadow: rgba(0, 0, 0, 0.9);
            --border-color: rgba(0, 230, 255, 0.15);
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --error-color: #f44336;
            --info-color: #2196F3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-start), #00152b, var(--bg-end));
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: var(--text-main); overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- STYLING LOGIN --- */
        #loginSection {
            background-color: var(--card-bg); backdrop-filter: blur(20px);
            width: 100%; max-width: 450px; padding: 50px 40px;
            border-radius: 20px; border: 1px solid var(--border-color);
            box-shadow: 20px 20px 40px var(--neumorphic-shadow), -20px -20px 40px var(--neumorphic-light);
            position: absolute; z-index: 10;
        }

        .header h1 {
            font-family: 'Syncopate', sans-serif; color: var(--error-color); 
            font-size: 20px; font-weight: 700; margin-bottom: 10px; text-align: center;
            text-shadow: 0 0 15px rgba(244, 67, 54, 0.5); letter-spacing: 2px;
        }

        .header p {
            text-align: center; color: var(--text-muted); font-size: 12px;
            margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label {
            display: block; margin-bottom: 10px; font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted);
        }
        .form-group input {
            width: 100%; padding: 15px 15px 15px 45px; background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent; border-radius: 10px; color: var(--text-main); font-size: 14px;
            box-shadow: inset 5px 5px 10px var(--neumorphic-shadow), inset -5px -5px 10px var(--neumorphic-light);
            transition: all 0.3s ease;
        }
        .form-group i { position: absolute; left: 18px; top: 40px; color: var(--text-muted); }
        .form-group input:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: inset 2px 2px 5px var(--neumorphic-shadow), 0 0 15px rgba(0, 230, 255, 0.3);
        }

        .btn-action {
            background-color: var(--bg-start); color: var(--primary-color);
            border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 8px;
            font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.3s ease;
            box-shadow: 4px 4px 10px var(--neumorphic-shadow), -4px -4px 10px var(--neumorphic-light);
        }
        .btn-action:hover { background-color: var(--bg-end); text-shadow: 0 0 5px var(--primary-color); }

        /* --- STYLING DASHBOARD --- */
        #dashboardSection {
            display: none; width: 100%; max-width: 1400px; height: 95vh;
            background-color: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border-color);
            padding: 25px; flex-direction: column;
            box-shadow: 15px 15px 35px var(--neumorphic-shadow), -15px -15px 35px var(--neumorphic-light);
        }

        .dash-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px;
        }

        .dash-header h2 { font-family: 'Syncopate', sans-serif; color: var(--primary-color); font-size: 18px; }
        .logout-btn { color: var(--error-color); border-color: rgba(244,67,54,0.3); }

        .table-responsive {
            flex-grow: 1; overflow-x: auto; overflow-y: auto; border-radius: 10px;
            background: rgba(0,0,0,0.2);
            box-shadow: inset 5px 5px 15px var(--neumorphic-shadow), inset -5px -5px 15px var(--neumorphic-light);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1300px; }
        th {
            background: rgba(0, 230, 255, 0.1); color: var(--primary-color); font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; padding: 15px;
            position: sticky; top: 0; z-index: 2; backdrop-filter: blur(10px);
        }
        td { padding: 12px 15px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #d1d5db; vertical-align: middle; }
        tr:hover td { background-color: rgba(255,255,255,0.02); color: #fff; }

        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; text-align: center; }
        .status-pending { background: rgba(255, 152, 0, 0.2); color: var(--warning-color); border: 1px solid var(--warning-color); }
        .status-approved { background: rgba(76, 175, 80, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }

        .action-cell { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-verify { color: var(--success-color); border-color: rgba(76,175,80,0.3); padding: 6px 10px; font-size: 10px; }
        .btn-delete { color: var(--error-color); border-color: rgba(244,67,54,0.3); padding: 6px 10px; font-size: 10px; }
        .btn-pdf { color: var(--info-color); border-color: rgba(33,150,243,0.3); padding: 6px 10px; font-size: 10px; }

        .img-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .thumbnail-container { text-align: center; }
        .thumbnail-container span { display: block; font-size: 9px; color: var(--primary-color); margin-bottom: 3px; font-weight: bold; }
        .thumbnail {
            width: 45px; height: 45px; object-fit: cover; border-radius: 5px; 
            border: 1px solid rgba(0, 230, 255, 0.5); cursor: pointer; transition: 0.3s;
        }
        .thumbnail:hover { transform: scale(1.15); box-shadow: 0 0 15px rgba(0, 230, 255, 0.8); z-index: 5; position: relative;}

        #imageModal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }
        .modal-content {
            margin: auto; display: block; max-width: 90%; max-height: 85vh; 
            margin-top: 5vh; border-radius: 10px; border: 2px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 230, 255, 0.3); object-fit: contain;
        }
        .close-modal {
            position: absolute; top: 20px; right: 35px; color: #fff; font-size: 40px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .close-modal:hover { color: var(--error-color); }
        #modalCaption { text-align: center; color: var(--primary-color); padding: 15px; font-weight: bold; font-size: 16px; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .dash-header { flex-direction: column; gap: 15px; text-align: center; }
            #dashboardSection { padding: 15px; height: 98vh;}
            table { min-width: 1000px; }
        }
    </style>
</head>
<body>

    <div id="imageModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="fullImage">
        <div id="modalCaption"></div>
    </div>

    <div id="loginSection">
        <div class="header">
            <h1>RESTRICTED AREA</h1>
            <p>Admin Command Center</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Admin Email</label><i class="fas fa-envelope"></i>
                <input type="email" id="email" required placeholder="admin@aice.com">
            </div>
            <div class="form-group">
                <label>Security Key</label><i class="fas fa-lock"></i>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-action" style="width: 100%; padding: 15px; font-size: 14px;" id="btnLogin">
                <i class="fas fa-fingerprint"></i> AUTHENTICATE
            </button>
            <div id="loginAlert" style="margin-top: 15px; text-align: center; color: var(--error-color); font-size: 12px; font-weight: bold;"></div>
        </form>
    </div>

    <div id="dashboardSection">
        <div class="dash-header">
            <div>
                <h2>AICE COMMAND CENTER</h2>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">Data Pendaftaran Lengkap Terenkripsi</p>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn-action" id="btnRefresh"><i class="fas fa-sync-alt"></i> REFRESH</button>
                <button class="btn-action logout-btn" id="btnLogout"><i class="fas fa-sign-out-alt"></i> DISCONNECT</button>
            </div>
        </div>

        <div id="loader" style="display:none; text-align:center; padding: 20px; color: var(--primary-color);"><i class="fas fa-circle-notch fa-spin"></i> FETCHING DATA...</div>

        <div class="table-responsive">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Info Mahasiswa</th>
                        <th>Akademik</th>
                        <th>File Bukti</th>
                        <th>Info Pembayaran</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_Vm_WiUckLP-FmoY_sampj-P1rR943PY",
            authDomain: "pendaftran-kunjungan-aice.firebaseapp.com",
            projectId: "pendaftran-kunjungan-aice",
            storageBucket: "pendaftran-kunjungan-aice.firebasestorage.app",
            messagingSenderId: "131381593832",
            appId: "1:131381593832:web:b7c094fc720c3f65c16b5d",
            measurementId: "G-E5ES6P4CD8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const tableBody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');

        // Menyimpan data sementara untuk PDF
        window.dataPendaftar = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'flex';
                fetchData();
            } else {
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');

            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> VERIFYING...';
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById('loginAlert').textContent = "";
            } catch (error) {
                document.getElementById('loginAlert').textContent = "ACCESS DENIED: Kredensial Salah.";
            } finally {
                btnLogin.innerHTML = '<i class="fas fa-fingerprint"></i> AUTHENTICATE';
            }
        });

        document.getElementById('btnLogout').addEventListener('click', () => { signOut(auth); });
        document.getElementById('btnRefresh').addEventListener('click', fetchData);

        async function fetchData() {
            loader.style.display = 'block';
            tableBody.innerHTML = '';
            window.dataPendaftar = {}; 
            
            try {
                const q = query(collection(db, "pendaftaran_aice_lengkap"), orderBy("tanggalPendaftaran", "desc"));
                const querySnapshot = await getDocs(q);
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const docId = docSnap.id;
                    
                    let waktu = data.tanggalPendaftaran ? data.tanggalPendaftaran.toDate().toLocaleString('id-ID') : "Tidak diketahui";
                    const statusClass = data.status === "APPROVED" ? "status-approved" : "status-pending";

                    window.dataPendaftar[docId] = { ...data, waktuDaftar: waktu };

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-size:10px;">${waktu}</td>
                        <td style="line-height: 1.6;">
                            <strong style="font-size: 14px;">${data.nama}</strong><br>
                            <span style="color:var(--primary-color); font-family:monospace; font-size:12px;">NIM: ${data.nim}</span><br>
                            <span style="font-size:10px; color:#aaa;"><i class="fab fa-whatsapp"></i> ${data.noWa || '-'}</span><br>
                            <span style="font-size:10px; color:#aaa;"><i class="fas fa-envelope"></i> ${data.email || '-'}</span>
                        </td>
                        <td style="font-size:11px; line-height: 1.6;">
                            <strong style="color:#fff;">${data.universitas}</strong><br>
                            Fakultas: ${data.fakultas}<br>
                            Prodi: ${data.prodi} (Smt: ${data.semester})<br>
                            Kelas: ${data.kelas} | Thn: ${data.tahunMasuk || '-'}
                        </td>
                        <td>
                            <div class="img-grid">
                                <div class="thumbnail-container">
                                    <span>KTM</span>
                                    <img src="${data.buktiKtmUrl}" class="thumbnail" onclick="openModal('${data.buktiKtmUrl}', 'Foto KTM - ${data.nama}')" onerror="this.src='https://via.placeholder.com/50?text=Error'">
                                </div>
                                <div class="thumbnail-container">
                                    <span>IG HMPS</span>
                                    <img src="${data.buktiIgHmpsUrl}" class="thumbnail" onclick="openModal('${data.buktiIgHmpsUrl}', 'Bukti Follow HMPS - ${data.nama}')" onerror="this.src='https://via.placeholder.com/50?text=Error'">
                                </div>
                                <div class="thumbnail-container">
                                    <span>IG UPU</span>
                                    <img src="${data.buktiIgUpuUrl}" class="thumbnail" onclick="openModal('${data.buktiIgUpuUrl}', 'Bukti Follow UPU - ${data.nama}')" onerror="this.src='https://via.placeholder.com/50?text=Error'">
                                </div>
                                <div class="thumbnail-container">
                                    <span>PAYMENT</span>
                                    <img src="${data.buktiPembayaranUrl}" class="thumbnail" style="border-color: var(--success-color);" onclick="openModal('${data.buktiPembayaranUrl}', 'Bukti Pembayaran - ${data.nama}')" onerror="this.src='https://via.placeholder.com/50?text=Error'">
                                </div>
                            </div>
                        </td>
                        <td style="font-size:11px; line-height: 1.6;">
                            Bank: <strong style="color:var(--primary-color);">${data.namaBank}</strong><br>
                            Rek: <span style="font-family:monospace; color:#fff;">${data.noRekening || '-'}</span>
                        </td>
                        <td><span class="status-badge ${statusClass}">${data.status}</span></td>
                        <td class="action-cell">
                            <button class="btn-action btn-pdf" id="btnPdf-${docId}" onclick="downloadPDF('${docId}')"><i class="fas fa-file-pdf"></i> PDF</button>
                            ${data.status !== "APPROVED" ? `<button class="btn-action btn-verify" onclick="verifyData('${docId}')"><i class="fas fa-check"></i> TERIMA</button>` : ''}
                            <button class="btn-action btn-delete" onclick="deleteData('${docId}')"><i class="fas fa-trash"></i> HAPUS</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error(error);
                alert("SYSTEM ERROR: Gagal mengambil data. Pastikan Anda punya akses Admin.");
            } finally {
                loader.style.display = 'none';
            }
        }

        window.openModal = function(imgSrc, caption) {
            document.getElementById('fullImage').src = imgSrc;
            document.getElementById('modalCaption').innerText = caption;
            document.getElementById('imageModal').style.display = 'block';
        }
        window.closeModal = function() { document.getElementById('imageModal').style.display = 'none'; }
        document.getElementById('imageModal').addEventListener('click', function(e) { if(e.target === this) { closeModal(); } });

        window.verifyData = async function(docId) {
            if(confirm("Otorisasi: Setujui pendaftar ini?")) {
                try {
                    await updateDoc(doc(db, "pendaftaran_aice_lengkap", docId), { status: "APPROVED" });
                    fetchData();
                } catch (error) { alert("Gagal memverifikasi."); }
            }
        };

        window.deleteData = async function(docId) {
            if(confirm("PERINGATAN KRITIS: Data akan dihapus permanen dari server. Lanjutkan?")) {
                try {
                    await deleteDoc(doc(db, "pendaftaran_aice_lengkap", docId));
                    fetchData();
                } catch (error) { alert("Gagal menghapus data."); }
            }
        };

        // FUNGSI DOWNLOAD PDF
        window.downloadPDF = async function(docId) {
            const btn = document.getElementById(`btnPdf-${docId}`);
            const data = window.dataPendaftar[docId];
            
            if (!data) { alert("Data tidak ditemukan."); return; }

            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROSES...';
            btn.disabled = true;

            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px'; 
            tempContainer.style.top = '0';
            
            // TEMPLATE PDF (Di-update agar memuat data baru secara lengkap)
            tempContainer.innerHTML = `
                <div id="pdf-content-${docId}" style="width: 800px; padding: 40px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; background: #fff;">
                    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px;">
                        <h2 style="margin: 0; color: #002244; font-size: 22px; text-transform: uppercase;">Bukti Pendaftaran Kunjungan Industri</h2>
                        <p style="margin: 5px 0 0 0; color: #666; font-size: 14px;">PT. Aice Sumatera Industry</p>
                    </div>
                    
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 13px;">
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; width: 35%; background: #f9f9f9;"><strong>Nama Lengkap</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.nama}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>NIM</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.nim}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Universitas / Fakultas</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.universitas} / ${data.fakultas}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Program Studi</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.prodi}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Kelas / Semester / Tahun</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.kelas} / Semester ${data.semester} / ${data.tahunMasuk || '-'}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>No. WA / Email</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.noWa || '-'} / ${data.email || '-'}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Kontak Darurat (Wali)</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd; white-space: pre-wrap;">${data.kontakWali || '-'}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Metode Transfer / Rekening</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.namaBank} - ${data.noRekening || '-'}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Waktu Pendaftaran</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd;">${data.waktuDaftar}</td></tr>
                        <tr><td style="padding: 8px 10px; border: 1px solid #ddd; background: #f9f9f9;"><strong>Status Verifikasi</strong></td><td style="padding: 8px 10px; border: 1px solid #ddd; font-weight: bold; color: ${data.status === 'APPROVED' ? 'green' : '#ff9800'};">${data.status}</td></tr>
                    </table>

                    <h3 style="margin-bottom: 15px; color: #002244; font-size: 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Lampiran Dokumen / Bukti:</h3>
                    
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                        <div style="width: 48%; margin-bottom: 15px; text-align: center;">
                            <p style="font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #555;">KTM</p>
                            <img src="${data.buktiKtmUrl}" style="max-width: 100%; height: 180px; object-fit: contain; border: 1px solid #ddd; padding: 5px; border-radius: 5px;">
                        </div>
                        <div style="width: 48%; margin-bottom: 15px; text-align: center;">
                            <p style="font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #555;">Bukti Pembayaran</p>
                            <img src="${data.buktiPembayaranUrl}" style="max-width: 100%; height: 180px; object-fit: contain; border: 1px solid #ddd; padding: 5px; border-radius: 5px;">
                        </div>
                        <div style="width: 48%; margin-bottom: 15px; text-align: center;">
                            <p style="font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #555;">Bukti Follow IG HMPS</p>
                            <img src="${data.buktiIgHmpsUrl}" style="max-width: 100%; height: 180px; object-fit: contain; border: 1px solid #ddd; padding: 5px; border-radius: 5px;">
                        </div>
                        <div style="width: 48%; margin-bottom: 15px; text-align: center;">
                            <p style="font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #555;">Bukti Follow IG UPU</p>
                            <img src="${data.buktiIgUpuUrl}" style="max-width: 100%; height: 180px; object-fit: contain; border: 1px solid #ddd; padding: 5px; border-radius: 5px;">
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(tempContainer);
            const element = document.getElementById(`pdf-content-${docId}`);

            const opt = {
                margin:       0.5,
                filename:     `Data_Kunjungan_${data.nim}_${data.nama.replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, allowTaint: true, logging: false },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            try {
                await new Promise(resolve => setTimeout(resolve, 500)); 
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                console.error("Gagal membuat PDF:", error);
                alert("Terjadi kesalahan saat memproses gambar. Pastikan internet stabil.");
            } finally {
                document.body.removeChild(tempContainer);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
